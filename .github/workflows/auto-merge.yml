name: Auto-merge to main

on:
  push:
    branches: ['claude/**']

permissions:
  contents: write
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  auto-merge:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Squash-merge to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --squash origin/${{ github.ref_name }}
          COMMIT_MSG=$(git log main..origin/${{ github.ref_name }} --reverse --format='%s' | head -1)
          git commit -m "${COMMIT_MSG:-Auto-merged from ${{ github.ref_name }}}"
          git push origin main

      - name: Trigger deploy
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete branch
        run: git push origin --delete ${{ github.ref_name }}
