name: Ticket Monitor

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests pyyaml python-dateutil

      - name: Download state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: monitor-state-${{ github.run_id }}
          restore-keys: monitor-state-

      - name: Run check
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor.py --once

      - name: Save state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: monitor-state-${{ github.run_id }}
