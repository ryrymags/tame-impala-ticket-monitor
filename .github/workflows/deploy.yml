name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/tame-impala-ticket-monitor
            git pull origin main
            venv/bin/pip install -q -r requirements.txt
            sudo systemctl restart ticket-monitor
            sleep 2
            sudo systemctl is-active ticket-monitor

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"username\": \"Ticket Monitor\", \"embeds\": [{\"title\": \"Deploy Failed\", \"color\": 15158332, \"description\": \"Auto-deploy to VM failed. [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"footer\": {\"text\": \"Face Value Exchange Monitor\"}}]}" \
            "$DISCORD_WEBHOOK_URL"
