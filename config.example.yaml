# =============================================================================
# Tame Impala Face Value Exchange Monitor — Browser-first configuration
# =============================================================================

discord:
  webhook_url: "YOUR_WEBHOOK_URL_HERE"
  username: "Ticketmaster"
  ping_user_id: ""  # Optional user id to @mention on ticket alerts

events:
  - event_id: "Za5ju3rKuqZDexDqkBlMyehlJWXnwBnVa-"
    name: "Tame Impala - The Deadbeat Tour (Night 1)"
    date: "2026-07-28"
    url: "https://www.ticketmaster.com/tame-impala-the-deadbeat-tour-boston-massachusetts-07-28-2026/event/01006430FEAADAD2"

  - event_id: "Za5ju3rKuqZDdqr7bcuPs7uyUCc6YkjYH2"
    name: "Tame Impala - The Deadbeat Tour (Night 2)"
    date: "2026-07-29"
    url: "https://www.ticketmaster.com/tame-impala-the-deadbeat-tour-boston-massachusetts-07-29-2026/event/01006444D7AFFD78"

browser:
  storage_state_path: "secrets/tm_storage_state.json"
  session_mode: "storage_state"  # storage_state | persistent_profile | cdp_attach
  user_data_dir: "secrets/tm_profile"
  channel: "chrome"
  cdp_endpoint_url: "http://127.0.0.1:9222"
  cdp_connect_timeout_seconds: 10
  reuse_event_tabs: true
  poll_min_seconds: 45
  poll_max_seconds: 60
  headless: true
  poll_interval_seconds: 12
  poll_jitter_seconds: 2
  event_stagger_seconds: 6
  navigation_timeout_seconds: 20
  challenge_threshold: 5
  challenge_retry_seconds: 60

browser_host:
  enabled: true
  chrome_executable_path: "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
  user_data_dir: "secrets/tm_chrome_profile"
  remote_debugging_port: 9222

alerts:
  ticket_cooldown_seconds: 180
  operational_heartbeat_hours: 6
  event_check_stale_seconds: 180
  operational_state_cooldown_seconds: 1800

polling:
  timezone: "US/Eastern"
  backoff_multiplier: 2.0
  max_backoff_seconds: 120

self_heal:
  browser_restart_threshold: 3
  browser_restart_window_seconds: 600
  process_restart_threshold: 6
  process_restart_window_seconds: 1800
  error_alert_cooldown_seconds: 1800

auth:
  auto_login_enabled: false
  keychain_service: "tame-impala-ticket-monitor"
  keychain_email_account: "ticketmaster-email"
  keychain_password_account: "ticketmaster-password"
  max_auto_login_attempts_per_hour: 3
  auto_login_cooldown_seconds: 1800
  session_health_check_interval_seconds: 3600  # Proactively verify auth every hour
  session_health_check_url: "https://www.ticketmaster.com/my-account"

watchdog:
  enabled: true
  interval_seconds: 120
  stale_after_seconds: 180
  max_fix_attempts_per_hour: 6

updates:
  enabled: true
  interval_seconds: 60
  stability_delay_seconds: 20
  watch_globs:
    - "monitor.py"
    - "src/**/*.py"
    - "config.yaml"
    - "requirements.txt"
    - "pyproject.toml"

logging:
  level: "INFO"
  file: "logs/monitor.log"
  max_file_size_mb: 10
  backup_count: 3
