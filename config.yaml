# =============================================================================
# Tame Impala Face Value Exchange Monitor — Configuration
# =============================================================================

# ---- Ticketmaster API ----
# Get a FREE API key:
#   1. Go to https://developer.ticketmaster.com/
#   2. Sign up for an account
#   3. Go to "My Apps", create a new app
#   4. Copy the "Consumer Key" — that's your API key
#      (The Consumer Secret is NOT needed)
# Rate limits: 5 requests/second, 5,000 requests/day
ticketmaster:
  api_key: "YOUR_API_KEY_HERE"

# ---- Discord Webhook ----
# Create a webhook:
#   1. Open Discord, go to your server
#   2. Server Settings > Integrations > Webhooks
#   3. Click "New Webhook", name it, pick a channel
#   4. Click "Copy Webhook URL" and paste below
discord:
  webhook_url: "OUR_WEBHOOK_URL_HERE"
  username: "Ticketmaster"         # Display name in Discord

# ---- Events to Monitor ----
# These are the two Tame Impala "Deadbeat Tour" shows at TD Garden.
# event_id is the Discovery API ID (NOT the legacy ID from the website URL).
# The website URL is kept as a fallback link for Discord notifications.
events:
  - event_id: "Za5ju3rKuqZDexDqkBlMyehlJWXnwBnVa-"
    name: "Tame Impala - The Deadbeat Tour (Night 1)"
    date: "2026-07-28"
    url: "https://www.ticketmaster.com/tame-impala-the-deadbeat-tour-boston-massachusetts-07-28-2026/event/01006430FEAADAD2"

  - event_id: "Za5ju3rKuqZDdqr7bcuPs7uyUCc6YkjYH2"
    name: "Tame Impala - The Deadbeat Tour (Night 2)"
    date: "2026-07-29"
    url: "https://www.ticketmaster.com/tame-impala-the-deadbeat-tour-boston-massachusetts-07-29-2026/event/01006444D7AFFD78"

# ---- Ticket Preferences ----
# max_price: Hard cutoff — anything above this is ignored (USD)
# preferred_sections: Ranked best-to-worst. Used for scoring, not hard filtering.
#   "General Admission" = GA / floor
#   "LOGE" = loge-level seating
#   "Balcony" = upper-level seating
preferences:
  max_price: 175.00
  currency: "USD"
  preferred_sections:
    - "General Admission"
    - "LOGE"
    - "Balcony"

# ---- Polling Intervals ----
# Two tiers to stay well under the 5,000/day API budget:
#   daytime: 8 AM – 1 AM ET (active hours, more frequent)
#   overnight: 1 AM – 8 AM ET (less frequent)
# Values are in seconds. Adjust to your comfort level.
polling:
  daytime_interval_seconds: 90       # Every 90 seconds during active hours
  overnight_interval_seconds: 300    # Every 5 minutes overnight
  daytime_start_hour: 8             # 8 AM ET
  daytime_end_hour: 1               # 1 AM ET (next day)
  backoff_multiplier: 1.5           # Multiply interval by this on errors
  max_backoff_seconds: 600          # Cap backoff at 10 minutes
  timezone: "US/Eastern"            # Venue timezone

# ---- Notification Settings ----
# cooldown_minutes: Minimum gap between alerts for the SAME event.
#   Prevents spam if tickets keep appearing/disappearing.
# score_threshold: Minimum score to trigger a Discord notification.
#   Scores below this are logged but not sent.
#   Scoring: GA=+100, LOGE=+60, Balcony=+30, <$100=+50, qty>=4=+40, qty>=2=+20
notifications:
  cooldown_minutes: 5
  score_threshold: 30
  notify_on_status_change: true     # Alert when event goes onsale/offsale
  daily_heartbeat_hour: 9           # Send daily heartbeat at 9 AM ET

# ---- Optional Features ----
# Page checker (Tier 3): Fetches the Ticketmaster event page HTML to extract
# embedded JSON for richer data. May get blocked by anti-bot systems.
# Leave disabled unless you want to experiment.
optional:
  enable_page_check: false
  page_check_interval_multiplier: 5  # Only run page check every Nth cycle

# ---- Logging ----
# level: DEBUG, INFO, WARNING, ERROR
# file: Path to log file (relative to project root)
logging:
  level: "INFO"
  file: "logs/monitor.log"
  max_file_size_mb: 10
  backup_count: 3
